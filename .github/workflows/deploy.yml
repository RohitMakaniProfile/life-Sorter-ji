name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - development
      - production
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
      - '.github/cloudrun/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIP }}
          service_account: ${{ secrets.GCP_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "SERVICE=ikshan-be-dev" >> $GITHUB_ENV
            echo "REPO=ikshan-be-dev" >> $GITHUB_ENV
            echo "APP_ENV=development" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.BACKEND_DATABASE_URL_DEV }}" >> $GITHUB_ENV
            echo "REDIS_URL=${{ secrets.BACKEND_REDIS_URL_DEV }}" >> $GITHUB_ENV
            echo "ENV_JSON=.github/cloudrun/env.development.json" >> $GITHUB_ENV
          else
            echo "SERVICE=ikshan-be-prod" >> $GITHUB_ENV
            echo "REPO=ikshan-be-prod" >> $GITHUB_ENV
            echo "APP_ENV=production" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.BACKEND_DATABASE_URL_PROD }}" >> $GITHUB_ENV
            echo "REDIS_URL=${{ secrets.BACKEND_REDIS_URL_PROD }}" >> $GITHUB_ENV
            echo "ENV_JSON=.github/cloudrun/env.production.json" >> $GITHUB_ENV
          fi

      - name: Set runtime env defaults
        run: |
          echo "OPENAI_MODEL=gpt-4.1" >> $GITHUB_ENV
          echo "CLAUDE_MODEL=claude-opus-4-6" >> $GITHUB_ENV
          echo "OPENROUTER_MODEL=z-ai/glm-5" >> $GITHUB_ENV
          echo "OPENROUTER_CLAUDE_MODEL=anthropic/claude-sonnet-4-6" >> $GITHUB_ENV
          echo "GEMINI_MODELS=gemini-2.5-flash-lite" >> $GITHUB_ENV
          echo "GEMINI_SCOUT_MODELS=gemini-2.5-flash-lite" >> $GITHUB_ENV
          echo "SKILL_DEBUG_LOGS=true" >> $GITHUB_ENV
          echo "STORAGE_BUCKET=/app/storage-bucket" >> $GITHUB_ENV
          echo "SKILLS_ROOT=/app/skills" >> $GITHUB_ENV
          echo "PYTHON_BIN=python3" >> $GITHUB_ENV

          # Read LLM/search keys from GitHub secrets.
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
          echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> $GITHUB_ENV

          # Backward-compatible aliases used by current skill runners.
          echo "GOOGLE_SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> $GITHUB_ENV
          echo "SERP_API_KEY=${{ secrets.SERPER_API_KEY }}" >> $GITHUB_ENV

      - name: Render Cloud Run env vars file
        run: |
          python3 - <<'PY'
          import json, os

          env_json = os.environ.get("ENV_JSON") or ""
          if not env_json:
            raise SystemExit("ENV_JSON not set")

          with open(env_json, "r", encoding="utf-8") as f:
            base = json.load(f)

          # Fill secrets from GitHub Actions env/secrets.
          secret_keys = [
            "DATABASE_URL",
            "REDIS_URL",
            "OPENAI_API_KEY",
            "OPENROUTER_API_KEY",
            "CLAUDE_API_KEY",
            "GEMINI_API_KEY",
            "SERPER_API_KEY",
            "GOOGLE_SERPER_API_KEY",
            "SERP_API_KEY",
            "IKSHAN_GOOGLE_CLIENT_ID",
            "JWT_SECRET_KEY",
          ]
          optional_secret_keys = {"REDIS_URL"}
          mapping = dict(base)
          for k in secret_keys:
            v = os.environ.get(k)
            if k in optional_secret_keys:
              mapping[k] = v or ""
              continue
            if not v:
              raise SystemExit(f"Missing required env var: {k}")
            mapping[k] = v

          def _stringify_env_value(key: str, value):
            # Allow authoring nice JSON (arrays/bools/objects) and compile to env strings.
            if value is None:
              return ""
            # Email allowlists are consumed as CSV in backend.
            if key in {
              "IKSHAN_ALLOWED_GOOGLE_EMAILS",
              "IKSHAN_SUPER_ADMIN_GOOGLE_EMAILS",
              "IKSHAN_ADMIN_GOOGLE_EMAILS",
              "IKSHAN_SUPER_ADMIN_PHONE_NUMBERS",
              "IKSHAN_ADMIN_PHONE_NUMBERS",
            }:
              if isinstance(value, list):
                return ",".join([str(x).strip() for x in value if str(x).strip()])
              return str(value).strip()
            # CORS_ORIGINS is parsed by pydantic as JSON list[str] from env.
            if key == "CORS_ORIGINS" and isinstance(value, list):
              return json.dumps(value, separators=(",", ":"))
            # Generic: serialize lists/dicts as compact JSON.
            if isinstance(value, (list, dict)):
              return json.dumps(value, separators=(",", ":"))
            if isinstance(value, bool):
              return "true" if value else "false"
            return str(value)

          # Write YAML map for `gcloud run deploy --env-vars-file`.
          out_path = "/tmp/cloudrun-env.yaml"
          with open(out_path, "w", encoding="utf-8") as out:
            for k in sorted(mapping.keys()):
              v = _stringify_env_value(k, mapping[k])
              # YAML single-quote escaping: '' inside '...'
              v = v.replace("'", "''")
              out.write(f"{k}: '{v}'\n")
          print(f"wrote {out_path} with {len(mapping)} vars")
          PY
        env:
          DATABASE_URL: ${{ env.DB_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERPER_API_KEY }}
          IKSHAN_GOOGLE_CLIENT_ID: ${{ secrets.IKSHAN_GOOGLE_CLIENT_ID }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      - name: Build & Push Docker Image
        run: |
          gcloud builds submit ./backend \
            --region asia-south1 \
            --tag asia-south1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/$REPO/app:${{ github.sha }} \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image asia-south1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/$REPO/app:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --timeout=3600 \
            --memory=4Gi \
            --cpu=2 \
            --concurrency=1 \
            --min-instances=1 \
            --env-vars-file /tmp/cloudrun-env.yaml \
            --allow-unauthenticated
