name: Deploy Scraper to Cloud Run

on:
  push:
    branches:
      - development
      - production
    paths:
      - "scraper/**"
      - ".github/workflows/deploy-scraper.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIP }}
          service_account: ${{ secrets.GCP_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set variables
        env:
          _VISION_KEY_DEV: ${{ secrets.SCRAPER_GOOGLE_VISION_API_KEY_DEV }}
          _VISION_KEY_PROD: ${{ secrets.SCRAPER_GOOGLE_VISION_API_KEY_PROD }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "SERVICE=ikshan-scraper-dev" >> $GITHUB_ENV
            echo "REPO=ikshan-scraper-dev" >> $GITHUB_ENV
            echo "APP_ENV=development" >> $GITHUB_ENV
            printf 'GOOGLE_VISION_API_KEY=%s\n' "$_VISION_KEY_DEV" >> $GITHUB_ENV
          else
            echo "SERVICE=ikshan-scraper-prod" >> $GITHUB_ENV
            echo "REPO=ikshan-scraper-prod" >> $GITHUB_ENV
            echo "APP_ENV=production" >> $GITHUB_ENV
            printf 'GOOGLE_VISION_API_KEY=%s\n' "$_VISION_KEY_PROD" >> $GITHUB_ENV
          fi

      - name: Render env-vars file
        run: |
          python3 - <<'PY'
          import os

          vision_key = os.environ.get("GOOGLE_VISION_API_KEY", "")
          app_env    = os.environ.get("APP_ENV", "development")

          mapping = {
            "GOOGLE_VISION_API_KEY": vision_key,
            "ENVIRONMENT": app_env,
          }

          out_path = "/tmp/scraper-env.yaml"
          with open(out_path, "w", encoding="utf-8") as f:
            for k, v in sorted(mapping.items()):
              v = str(v).replace("'", "''")
              f.write(f"{k}: '{v}'\n")
          print(f"wrote {out_path} with {len(mapping)} vars")
          PY
        env:
          GOOGLE_VISION_API_KEY: ${{ env.GOOGLE_VISION_API_KEY }}
          APP_ENV: ${{ env.APP_ENV }}

      - name: Build & Push Docker Image
        run: |
          gcloud builds submit ./scraper \
            --region asia-south1 \
            --tag asia-south1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/$REPO/app:${{ github.sha }} \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image asia-south1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/$REPO/app:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --timeout=300 \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=4 \
            --min-instances=0 \
            --env-vars-file /tmp/scraper-env.yaml \
            --allow-unauthenticated
