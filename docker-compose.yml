services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ikshan
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    environment:
      PORT: "8081"
    ports:
      - "8082:8081"
    shm_size: "1gb"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/ikshan"
      SCRAPER_BASE_URL: "http://scraper:8081"
    depends_on:
      - postgres
      - scraper
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_URL: "http://localhost:8000"
      HOST: "0.0.0.0"
      PORT: "5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  pg_data:
  frontend_node_modules:
